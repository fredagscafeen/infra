services:
  traefik:
    container_name: traefik
    image: traefik:2.4
    restart: always
    ports:
      - 80:80
      - 443:443
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${TRAEFIK_CLOUDFLARE_DNS_API_TOKEN}
    labels:
      - traefik.enable=true

      # Dashboard / API
      - traefik.http.routers.api.rule=Host(`traefik.fredagscafeen.dk`)
      - traefik.http.routers.api.service=api@internal
      - traefik.http.routers.api.middlewares=auth
      - traefik.http.services.api.loadbalancer.server.port=80
      - traefik.http.middlewares.auth.basicauth.usersfile=/traefik-api-usersfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml
      - ./acme.json:/acme.json
      - ../usersfile:/traefik-api-usersfile
    networks:
      - traefik

networks:
  traefik:
    name: traefik